experiment:
  seed: 7
  device: cpu
  cpu_threads: 1
  output_dir: runs/smoke

data:
  csv_path: demo_data.csv
  steps_per_day: 96
  strict_complete_days: true

stress:
  min_group_size: 3
  active_threshold: 1.2
  deviation_clip: 6.0
  variable_weights:
    price: 0.35
    load: 0.35
    lambda: 0.15
    joint: 0.15
  variable_component_weights:
    level: 0.50
    ramp: 0.25
    duration: 0.25
  joint_weights:
    two_or_more: 0.70
    three: 0.30

model:
  hidden_size: 64
  depth: 2
  num_heads: 4
  mlp_ratio: 2.0
  dropout: 0.05

diffusion:
  timesteps: 20
  beta_schedule: cosine
  observed_loss_weight: 0.10
  clip_denoised: true

training:
  epochs: 2
  batch_size: 16
  learning_rate: 0.0005
  weight_decay: 0.0001
  grad_clip: 1.0
  val_fraction: 0.15
  mask_probs:
    reconstruction: 0.40
    random: 0.25
    block: 0.20
    stride: 0.15

generation:
  mainB_quantile_range: [0.35, 0.70]
  stressA_quantile_range: [0.88, 0.98]
  num_candidates: 2
